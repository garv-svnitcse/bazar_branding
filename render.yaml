# Render Infrastructure-as-Code Blueprint
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: bazaar-branding-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: PORT
        value: 4000
      - key: ADMIN_KEY
        generateValue: true
      - key: ALLOWED_ORIGIN
        value: "*"
